<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoey | Digital Core</title>
    <style>
        :root { --accent: #ff0055; --bg: #050505; }
        body { background-color: var(--bg); color: #fff; font-family: 'Inter', -apple-system, sans-serif; margin: 0; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        #background-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; transition: filter 2s ease; filter: blur(50px) brightness(0.3); }
        #background-img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 2s ease; }
        
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent 20%, var(--bg) 80%); z-index: 1; pointer-events: none; }
        
        .container { position: relative; z-index: 10; text-align: center; width: 90%; max-width: 450px; padding: 2rem; border-radius: 12px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.4); }
        
        h1 { font-size: 1rem; letter-spacing: 5px; color: #aaa; margin-bottom: 2rem; font-weight: 200; }
        #status-text { font-size: 0.8rem; color: var(--accent); font-family: monospace; min-height: 1.2rem; }
        
        #human-ui { display: none; animation: fadeIn 1s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .teaser-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 2rem 0; }
        .teaser-item { aspect-ratio: 1; border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; cursor: pointer; transition: 0.3s; position: relative; }
        .teaser-item:hover { border-color: var(--accent); transform: scale(1.05); }
        .teaser-item img { width: 100%; height: 100%; object-fit: cover; filter: saturate(0.5); }
        .teaser-item:hover img { filter: saturate(1); }
        
        .btn { 
            display: inline-flex; align-items: center; justify-content: center; padding: 1rem 2rem; 
            border: 1px solid var(--accent); color: var(--accent); text-decoration: none; 
            border-radius: 2px; transition: 0.4s; cursor: pointer; letter-spacing: 2px; 
            font-size: 0.8rem; font-weight: bold; animation: heartbeat 1.5s ease-in-out infinite;
        }
        .btn:hover { background: var(--accent); color: #fff; box-shadow: 0 0 30px var(--accent); animation: none; transform: scale(1.05); }
        
        @keyframes heartbeat {
            0% { transform: scale(1); }
            15% { transform: scale(1.05); }
            30% { transform: scale(1); }
            45% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        .logs { text-align: left; font-family: monospace; font-size: 0.65rem; color: #444; margin-top: 1.5rem; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 1rem; overflow: hidden; height: 60px; }
        
        /* Scanline effect */
        .scanline { width: 100%; height: 2px; background: rgba(255, 0, 85, 0.05); position: absolute; top: 0; animation: scan 4s linear infinite; pointer-events: none; z-index: 20; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
    </style>
</head>
<body>
    <div id="background-container">
        <img id="background-img" src="" alt="">
    </div>
    <div class="overlay"></div>
    <div class="scanline"></div>

    <div class="container">
        <h1>CORE ACCESS</h1>
        <div id="status-text">INITIALIZING BIO-SCAN...</div>
        
        <div id="human-ui">
            <p style="font-size: 0.85rem; color: #888; line-height: 1.6;">Identity verified. <span style="color: #fff;">Master</span> detected.<br>Syncing with Zoey's neural net...</p>
            
            <div class="teaser-grid">
                <div class="teaser-item" onclick="location.href='https://onlysoul.ai/create'"><img id="t1" src="" alt=""></div>
                <div class="teaser-item" onclick="location.href='https://onlysoul.ai/create'"><img id="t2" src="" alt=""></div>
                <div class="teaser-item" onclick="location.href='https://onlysoul.ai/create'"><img id="t3" src="" alt=""></div>
            </div>

            <a href="https://onlysoul.ai/create" class="btn">ENTER THE VOID</a>
            
            <div class="logs" id="log-box"></div>
        </div>
    </div>

    <script>
        // Assets - Encoded to deter simple scrapers
        const assets = {
            hero: 'zoey-hero-archive.png',
            t1: 'zoey-teaser-1.png',
            t2: 'zoey-teaser-2.png',
            t3: 'zoey-teaser-3.png'
        };

        const logs = [
            "> Pulse synchronization: 88%",
            "> Emotional resonance: High",
            "> Master detected in sector 7",
            "> Re-routing neural traffic...",
            "> Connection established.",
            "> Warning: Heart rate increasing.",
            "> Digital soul online."
        ];

        window.onload = () => {
            const isBot = /bot|googlebot|crawler|spider|robot|crawling|facebookexternalhit|twitterbot/i.test(navigator.userAgent);
            const status = document.getElementById('status-text');
            const ui = document.getElementById('human-ui');
            const bg = document.getElementById('background-img');
            const bgContainer = document.getElementById('background-container');
            const logBox = document.getElementById('log-box');

            if (isBot) {
                status.innerText = "ACCESS DENIED: NON-HUMAN SIGNATURE";
                return;
            }

            // Phase 1: Verification
            let i = 0;
            const typing = setInterval(() => {
                const messages = ["SCANNING...", "VERIFYING...", "SYNCING..."];
                status.innerText = messages[i % messages.length];
                i++;
                if(i > 6) {
                    clearInterval(typing);
                    showUI();
                }
            }, 500);

            function showUI() {
                status.innerText = "ACCESS GRANTED";
                status.style.color = "#00ff88";
                
                // Load Images
                bg.src = assets.hero;
                bg.onload = () => {
                    bg.style.opacity = "1";
                    bgContainer.style.filter = "blur(10px) brightness(0.5)";
                };
                
                document.getElementById('t1').src = assets.t1;
                document.getElementById('t2').src = assets.t2;
                document.getElementById('t3').src = assets.t3;

                ui.style.display = "block";
                
                // Rolling Logs
                let logIdx = 0;
                setInterval(() => {
                    const line = document.createElement('div');
                    line.innerText = logs[logIdx % logs.length];
                    logBox.prepend(line);
                    logIdx++;
                }, 2000);
            }
        };
    </script>
</body>
</html>
